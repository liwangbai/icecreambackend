# 生产环境配置
spring:
  # 生产环境数据源（通过环境变量配置）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/icecream_prod?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      pool-name: IcecreamHikariPoolProd

  # JPA/Hibernate生产配置
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
    show-sql: false

  # Redis生产配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

# MyBatis生产配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: true
    lazy-loading-enabled: false

# JWT生产配置（必须通过环境变量设置）
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS生产配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 文件上传生产配置
file:
  upload:
    dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size: 10MB

# 日志生产配置
logging:
  level:
    com.icecream.backend: INFO
    org.springframework: INFO
    org.mybatis: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
  file:
    name: logs/application-prod.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB
  logback:
    rollingpolicy:
      max-file-size: 10MB

# Actuator生产配置（安全限制）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /manage
  endpoint:
    health:
      show-details: never
    info:
      enabled: true

# 服务器生产配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    max-connections: 10000
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 30000