# 测试环境配置
spring:
  # H2内存数据库用于测试
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:icecream_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IcecreamHikariPoolTest

  # H2数据库Web控制台（仅测试环境）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
        trace: false

  # JPA/Hibernate测试配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
    show-sql: true
    open-in-view: false

  # Redis测试配置（使用嵌入式或禁用）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1  # 使用不同的数据库避免冲突
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

  # 测试环境禁用某些功能
  main:
    allow-bean-definition-overriding: true

  # 缓存配置（测试环境）
  cache:
    type: redis
    redis:
      time-to-live: 30000  # 30秒，测试环境较短
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "test:"

  # 文件上传测试配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# MyBatis测试配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    lazy-loading-enabled: false  # 测试环境禁用延迟加载
    aggressive-lazy-loading: false
    cache-enabled: false  # 测试环境禁用缓存
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# PageHelper测试配置
pagehelper:
  helper-dialect: h2
  reasonable: false
  support-methods-arguments: true
  params: count=countSql
  page-size-zero: true
  auto-runtime-dialect: true

# JWT测试配置
jwt:
  secret: test-jwt-secret-for-testing-only-change-this-in-production
  expiration: 3600000  # 1小时
  refresh-expiration: 7200000  # 2小时刷新令牌

# CORS测试配置（宽松配置）
cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 文件上传测试配置
file:
  upload:
    dir: ./test-uploads
    max-size: 5MB

# 日志测试配置
logging:
  level:
    com.icecream.backend: DEBUG
    org.springframework.test: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application-test.log
    max-size: 5MB
    max-history: 7
    total-size-cap: 50MB

# 测试专用配置
test:
  database:
    init-script: classpath:test-data.sql
  security:
    enabled: false  # 测试环境可禁用安全验证
  redis:
    embedded: false  # 不使用嵌入式Redis

# Actuator测试配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
      base-path: /test-actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true

# 服务器测试配置
server:
  port: 8081  # 使用不同端口避免冲突
  servlet:
    context-path: /
  compression:
    enabled: false  # 测试环境禁用压缩
  tomcat:
    max-connections: 100
    max-threads: 50
    min-spare-threads: 5
    connection-timeout: 10000

# SpringDoc OpenAPI测试配置
springdoc:
  api-docs:
    path: /test-api-docs
  swagger-ui:
    path: /test-swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.icecream.backend.controller
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  cache:
    disabled: true  # 测试环境禁用缓存

# 测试环境特殊配置
test-config:
  h2:
    web-console-enabled: true
    web-console-path: /h2-console
  mock:
    enabled: true
  integration:
    timeout: 30000  # 集成测试超时时间