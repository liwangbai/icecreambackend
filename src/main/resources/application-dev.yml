# 开发环境配置
spring:
  # 数据源配置（MySQL 8.1.0）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/icecream_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: a123456789
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IcecreamHikariPool

  # JPA/Hibernate配置（用于实体映射验证）
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    show-sql: true

  # Redis开发配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# MyBatis开发配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    lazy-loading-enabled: true
    aggressive-lazy-loading: false

# 文件上传配置
file:
  upload:
    dir: ./uploads
    max-size: 10MB

# JWT配置（开发环境）
jwt:
  secret: your-256-bit-secret-key-change-this-in-production
  expiration: 86400000  # 24小时

# CORS配置（开发环境）
cors:
  allowed-origins: http://localhost:3000,http://localhost:8080
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 日志级别（开发环境详细）
logging:
  level:
    com.icecream.backend: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE